<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Page</title>
</head>
<body>

<h1>Admin Page</h1>

<script>

    async function checkAuth() {

        const response = await fetch("/api/v1/products", {
            credentials: "include"
        });

        if (response.status === 401) {

            window.location.href = "/login";
        }
    }

    checkAuth();

</script>

</body>
</html>
